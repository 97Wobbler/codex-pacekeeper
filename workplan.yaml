meta:
  created: 2026-07-13
  spec_source: "User request to fix Codex Pacekeeper after WHAM changed from two windows to a single seven-day window"
  as_is: "WhamUsageClient requires primary_window and secondary_window objects and hard-codes them as 5h and week, so secondary_window: null fails decoding and surfaces a generic missing-data error."
  to_be: "Codex Pacekeeper decodes one- or two-window WHAM responses, labels windows from their actual duration, displays and notifies only the windows supplied by the API, and continues to support the legacy response."

tasks:
  - id: T01
    name: "Support dynamic Codex usage windows"
    blocked_by: []
    human_gate: null
    done: true
    status: committed
    estimated_size: S
    spec: |
      Make WHAM primary and secondary windows optional, reject only responses with no usable windows,
      sort and label available windows by limit_window_seconds, and preserve the available reading list
      in UsageSnapshot. Use that list for expanded UI rows and notifications so a weekly-only response
      appears once. Preserve existing primary/weekly compatibility for recommendation and history logic.
      Add URLSession-backed regression tests for both legacy two-window and current weekly-only payloads.
    output:
      - Sources/CodexPacekeeperCore/WhamUsageClient.swift
      - Sources/CodexPacekeeperCore/PaceModel.swift
      - Sources/CodexPacekeeper/PaceViews.swift
      - Sources/CodexPacekeeper/AppDelegate.swift
      - Tests/CodexPacekeeperTests/WhamUsageClientTests.swift
      - Tests/CodexPacekeeperTests/PaceModelTests.swift
      - Tests/CodexPacekeeperTests/ClaudeAuthTokenStoreTests.swift
    verify_checks:
      - "swift test --filter WhamUsageClientTests"
      - "swift test"
      - "scripts/package-release.sh"
      - "Restart dist/CodexPacekeeper.app and confirm a fresh Codex usage sample is recorded"
    lifecycle:
      started_at: "2026-07-13T20:37:43+09:00"
      verified_at: "2026-07-13T20:50:30+09:00"
      committed_at: "2026-07-13T20:50:30+09:00"
      worker_id: root
      commit: "task commit"
